
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemhem Analytics Dashboard</title>
    
    <!-- Scripts for React, Recharts, and Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --card-border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .recharts-cartesian-grid-horizontal line,
        .recharts-cartesian-grid-vertical line {
            stroke: #27272a;
        }

        .recharts-tooltip-wrapper {
            outline: none !important;
        }

        .custom-tooltip {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Recharts is exposed on window.Recharts in the UMD build
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            BarChart, Bar, Cell, PieChart, Pie, Legend, LineChart, Line
        } = window.Recharts;
        
        // Helper to use Lucide icons in React
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = React.useRef(null);
            
            React.useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = "";
                    const iconElement = window.lucide.icons[name];
                    if (iconElement) {
                        const svg = iconElement.toSvg({
                            width: size,
                            height: size,
                            class: className
                        });
                        ref.current.innerHTML = svg;
                    }
                }
            }, [name, size, className]);
            
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const DASHBOARD_DATA = {
  "summary": {
    "totalRevenue": 124592,
    "activeUsers": 14208,
    "conversionRate": 3.2,
    "avgOrderValue": 84.2
  },
  "timeSeries": [
    {
      "name": "Mon",
      "value": 4000,
      "secondary": 2400
    },
    {
      "name": "Tue",
      "value": 3000,
      "secondary": 1398
    },
    {
      "name": "Wed",
      "value": 2000,
      "secondary": 9800
    },
    {
      "name": "Thu",
      "value": 2780,
      "secondary": 3908
    },
    {
      "name": "Fri",
      "value": 1890,
      "secondary": 4800
    },
    {
      "name": "Sat",
      "value": 2390,
      "secondary": 3800
    },
    {
      "name": "Sun",
      "value": 3490,
      "secondary": 4300
    }
  ],
  "categories": [
    {
      "name": "Direct",
      "value": 400,
      "color": "#3b82f6"
    },
    {
      "name": "Social",
      "value": 300,
      "color": "#10b981"
    },
    {
      "name": "Referral",
      "value": 300,
      "color": "#f59e0b"
    },
    {
      "name": "Other",
      "value": 200,
      "color": "#8b5cf6"
    }
  ],
  "regions": [
    {
      "region": "North",
      "sales": 4500
    },
    {
      "region": "South",
      "sales": 3200
    },
    {
      "region": "East",
      "sales": 2800
    },
    {
      "region": "West",
      "sales": 5100
    },
    {
      "region": "Central",
      "sales": 1900
    }
  ]
};

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="custom-tooltip">
                        <p className="text-sm font-semibold mb-1 text-zinc-100">{label}</p>
                        {payload.map((entry, index) => (
                            <div key={index} className="flex items-center gap-2 text-xs">
                                <div 
                                    className="w-2 h-2 rounded-full" 
                                    style={{ backgroundColor: entry.color }}
                                />
                                <span className="text-zinc-400">{entry.name}:</span>
                                <span className="text-zinc-100 font-medium">
                                    {entry.value.toLocaleString()}
                                </span>
                            </div>
                        ))}
                    </div>
                );
            }
            return null;
        };

        const StatCard = ({ label, value, trend, trendType, iconName, color }) => (
            <div className="glass-card p-6 flex flex-col">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-2 rounded-lg ${color} bg-opacity-10 text-${color.split('-')[1]}-500`}>
                        <Icon name={iconName} size={20} />
                    </div>
                    <div className={`flex items-center text-xs font-medium ${trendType === 'up' ? 'text-emerald-400' : 'text-rose-400'}`}>
                        <Icon 
                            name={trendType === 'up' ? 'TrendingUp' : 'TrendingDown'} 
                            size={14} 
                            className="mr-1" 
                        />
                        {trend}
                    </div>
                </div>
                <div className="text-zinc-400 text-sm font-medium mb-1 uppercase tracking-wider">{label}</div>
                <div className="text-2xl font-bold text-white">{value}</div>
            </div>
        );

        const App = () => {
            return (
                <div className="min-h-screen p-6 md:p-10 max-w-[1600px] mx-auto">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                        <div>
                            <h1 className="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent">
                                Analytics Overview
                            </h1>
                            <p className="text-zinc-400 mt-2 text-lg">Detailed performance breakdown and system insights.</p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3">
                            <button className="flex items-center gap-2 px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-sm font-medium hover:bg-zinc-800 transition-all">
                                <Icon name="Calendar" size={16} />
                                Last 7 Days
                            </button>
                            <button className="p-2.5 bg-zinc-900 border border-zinc-800 rounded-lg hover:bg-zinc-800 transition-all">
                                <Icon name="Filter" size={18} />
                            </button>
                            <button className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 rounded-lg text-sm font-semibold hover:bg-blue-500 transition-all text-white shadow-lg shadow-blue-900/20">
                                <Icon name="Download" size={16} />
                                Export PDF
                            </button>
                        </div>
                    </div>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                        <StatCard 
                            label="Total Revenue" 
                            value={"$" + DASHBOARD_DATA.summary.totalRevenue.toLocaleString()}
                            trend="+12.5%" 
                            trendType="up"
                            iconName="DollarSign"
                            color="bg-blue-500"
                        />
                        <StatCard 
                            label="Active Users" 
                            value={DASHBOARD_DATA.summary.activeUsers.toLocaleString()}
                            trend="+5.2%" 
                            trendType="up"
                            iconName="Users"
                            color="bg-purple-500"
                        />
                        <StatCard 
                            label="Conversion Rate" 
                            value={DASHBOARD_DATA.summary.conversionRate + "%"}
                            trend="-0.8%" 
                            trendType="down"
                            iconName="Activity"
                            color="bg-emerald-500"
                        />
                        <StatCard 
                            label="Avg Order Value" 
                            value={"$" + DASHBOARD_DATA.summary.avgOrderValue}
                            trend="+2.1%" 
                            trendType="up"
                            iconName="ShoppingCart"
                            color="bg-amber-500"
                        />
                    </div>

                    {/* Main Content Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Area Chart - Main Visual */}
                        <div className="lg:col-span-2 glass-card p-6 min-h-[450px] flex flex-col">
                            <div className="flex justify-between items-center mb-8">
                                <div>
                                    <h3 className="text-xl font-bold">Revenue Growth</h3>
                                    <p className="text-sm text-zinc-500 mt-1">Daily revenue performance over time</p>
                                </div>
                                <div className="flex gap-2">
                                    <button className="text-xs px-3 py-1 bg-zinc-800 rounded-full text-zinc-300">Revenue</button>
                                    <button className="text-xs px-3 py-1 border border-zinc-800 rounded-full text-zinc-500">Expenses</button>
                                </div>
                            </div>
                            <div className="flex-grow w-full h-[300px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={DASHBOARD_DATA.timeSeries}>
                                        <defs>
                                            <linearGradient id="colorValue" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis 
                                            dataKey="name" 
                                            axisLine={false} 
                                            tickLine={false} 
                                            tick={{ fill: '#71717a', fontSize: 12 }}
                                            dy={10}
                                        />
                                        <YAxis 
                                            axisLine={false} 
                                            tickLine={false} 
                                            tick={{ fill: '#71717a', fontSize: 12 }}
                                        />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Area 
                                            type="monotone" 
                                            dataKey="value" 
                                            stroke="#3b82f6" 
                                            strokeWidth={3}
                                            fillOpacity={1} 
                                            fill="url(#colorValue)" 
                                            animationDuration={1500}
                                        />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Pie Chart */}
                        <div className="glass-card p-6 flex flex-col">
                            <h3 className="text-xl font-bold mb-1">Traffic Distribution</h3>
                            <p className="text-sm text-zinc-500 mb-8">User acquisition by source</p>
                            <div className="flex-grow w-full h-[300px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie
                                            data={DASHBOARD_DATA.categories}
                                            cx="50%"
                                            cy="50%"
                                            innerRadius={60}
                                            outerRadius={80}
                                            paddingAngle={8}
                                            dataKey="value"
                                            stroke="none"
                                            animationDuration={1500}
                                        >
                                            {DASHBOARD_DATA.categories.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.color} />
                                            ))}
                                        </Pie>
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend verticalAlign="bottom" height={36} />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Bar Chart */}
                        <div className="glass-card p-6 min-h-[400px]">
                            <h3 className="text-xl font-bold mb-1">Regional Sales</h3>
                            <p className="text-sm text-zinc-500 mb-8">Performance across top markets</p>
                            <div className="w-full h-[280px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={DASHBOARD_DATA.regions}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis 
                                            dataKey="region" 
                                            axisLine={false} 
                                            tickLine={false}
                                            tick={{ fill: '#71717a', fontSize: 12 }}
                                            dy={10}
                                        />
                                        <YAxis 
                                            axisLine={false} 
                                            tickLine={false}
                                            tick={{ fill: '#71717a', fontSize: 12 }}
                                        />
                                        <Tooltip content={<CustomTooltip />} cursor={{fill: 'rgba(255,255,255,0.05)'}} />
                                        <Bar 
                                            dataKey="sales" 
                                            fill="#3b82f6" 
                                            radius={[6, 6, 0, 0]}
                                            animationDuration={1500}
                                        >
                                            {DASHBOARD_DATA.regions.map((entry, index) => (
                                                <Cell 
                                                    key={`cell-${index}`} 
                                                    fill={index === 3 ? '#6366f1' : '#3b82f6'} 
                                                    opacity={0.8 + (index * 0.05)}
                                                />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Line Chart / Secondary Metric */}
                        <div className="lg:col-span-2 glass-card p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-8">
                                <div>
                                    <h3 className="text-xl font-bold">User Engagement</h3>
                                    <p className="text-sm text-zinc-500 mt-1">Active sessions vs. bounce rate</p>
                                </div>
                                <button className="p-2 hover:bg-zinc-800 rounded-lg transition-all text-zinc-500">
                                    <Icon name="MoreHorizontal" size={20} />
                                </button>
                            </div>
                            <div className="flex-grow w-full h-[280px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={DASHBOARD_DATA.timeSeries}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis 
                                            dataKey="name" 
                                            axisLine={false} 
                                            tickLine={false}
                                            tick={{ fill: '#71717a', fontSize: 12 }}
                                            dy={10}
                                        />
                                        <YAxis 
                                            axisLine={false} 
                                            tickLine={false}
                                            tick={{ fill: '#71717a', fontSize: 12 }}
                                        />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Line 
                                            type="stepAfter" 
                                            dataKey="secondary" 
                                            stroke="#10b981" 
                                            strokeWidth={3} 
                                            dot={{ r: 4, fill: '#10b981', strokeWidth: 2, stroke: '#09090b' }}
                                            activeDot={{ r: 6, fill: '#10b981', strokeWidth: 2, stroke: '#09090b' }}
                                            animationDuration={2000}
                                        />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>
                    
                    {/* Footer */}
                    <div className="mt-12 pt-8 border-t border-zinc-800 flex justify-between items-center text-zinc-500 text-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            System Operational
                        </div>
                        <div>Generated on {new Date().toLocaleString()}</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
